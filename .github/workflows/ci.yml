name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Unit tests
        run: python -m unittest discover -s tests -v

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: [test]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --onefile --noconsole --name "Zee-Cut" main.py

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} dist/Zee-Cut.exe `
            --title "Zee-Cut ${{ github.ref_name }}" `
            --notes "Automated release for ${{ github.ref_name }}. See CHANGELOG.md for details." ||
          gh release upload ${{ github.ref_name }} dist/Zee-Cut.exe --clobber
