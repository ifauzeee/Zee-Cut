name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Type check (mypy)
        run: python -m mypy core ui main.py gui.py

      - name: Unit tests with coverage
        run: python -m coverage run -m unittest discover -s tests -v

      - name: Coverage report
        run: python -m coverage report --fail-under=35 -m

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: [test]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --onefile --noconsole --name "Zee-Cut" --icon "assets/icon.ico" --add-data "assets;assets" main.py

      - name: Code sign executable
        if: ${{ env.WINDOWS_CODESIGN_PFX != '' }}
        env:
          WINDOWS_CODESIGN_PFX: ${{ secrets.WINDOWS_CODESIGN_PFX }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $pfxPath = "${{ runner.temp }}/codesign.pfx"
          [System.Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX) | Set-Content -Path $pfxPath -AsByteStream
          & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
            /f $pfxPath /p "$env:WINDOWS_CODESIGN_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            dist/Zee-Cut.exe

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: zee-cut-exe
          path: dist/Zee-Cut.exe
          if-no-files-found: error

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} dist/Zee-Cut.exe `
            --title "Zee-Cut ${{ github.ref_name }}" `
            --notes "Automated release for ${{ github.ref_name }}. See CHANGELOG.md for details." ||
          gh release upload ${{ github.ref_name }} dist/Zee-Cut.exe --clobber

  build-installer:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: [build]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: zee-cut-exe
          path: dist

      - name: Install NSIS
        run: choco install nsis --no-progress

      - name: Build installer
        run: makensis /DAPPVERSION="${{ github.ref_name }}" installer/zee-cut.nsi

      - name: Code sign installer
        if: ${{ env.WINDOWS_CODESIGN_PFX != '' }}
        env:
          WINDOWS_CODESIGN_PFX: ${{ secrets.WINDOWS_CODESIGN_PFX }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $pfxPath = "${{ runner.temp }}/codesign.pfx"
          [System.Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX) | Set-Content -Path $pfxPath -AsByteStream
          & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
            /f $pfxPath /p "$env:WINDOWS_CODESIGN_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "dist/Zee-Cut-Setup-${{ github.ref_name }}.exe"

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} "dist/Zee-Cut-Setup-${{ github.ref_name }}.exe" --clobber
